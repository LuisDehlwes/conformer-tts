seed: 42

audio:
  sample_rate: 22050
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  n_mels: 80
  f_min: 0.0
  f_max: 8000.0

text:
  language: "de"
  use_phonemes: true
  cleaners: ["german_cleaners"]

model:
  hidden_dim: 128
  n_heads: 2
  encoder:
    n_layers: 2
    conv_kernel: 15
    ff_expansion: 2
    dropout: 0.1
  decoder:
    n_layers: 2
    conv_kernel: 15
    ff_expansion: 2
    dropout: 0.1
  variance:
    duration_kernel: 3
    pitch_kernel: 3
    energy_kernel: 3
    dropout: 0.5

data:
  dataset: "thorsten"
  root: "data/thorsten"
  train_meta: "metadata_train.csv"
  val_meta: "metadata_val.csv"
  num_workers: 2

training:
  batch_size: 8
  max_steps: 10000
  precision: "32-true"
  lr: 1.0e-4
  warmup_steps: 1000
  grad_clip: 1.0
  log_every_n_steps: 25
  val_check_interval: 500
  save_every_n_steps: 1000
  output_dir: "runs/small"

vocoder:
  type: "hifigan"
  checkpoint: null
