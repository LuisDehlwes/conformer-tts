seed: 42

audio:
  sample_rate: 22050
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  n_mels: 80
  f_min: 0.0
  f_max: 8000.0

text:
  language: "de"
  use_phonemes: true
  cleaners: ["german_cleaners"]

model:
  hidden_dim: 384
  n_heads: 6
  encoder:
    n_layers: 6
    conv_kernel: 31
    ff_expansion: 4
    dropout: 0.1
  decoder:
    n_layers: 6
    conv_kernel: 31
    ff_expansion: 4
    dropout: 0.1
  variance:
    duration_kernel: 3
    pitch_kernel: 3
    energy_kernel: 3
    dropout: 0.5

data:
  dataset: "thorsten"
  root: "data/thorsten"
  train_meta: "metadata_train.csv"
  val_meta: "metadata_val.csv"
  num_workers: 6

training:
  batch_size: 32
  max_steps: 400000
  precision: "16-mixed"
  lr: 1.0e-4
  warmup_steps: 8000
  grad_clip: 1.0
  log_every_n_steps: 50
  val_check_interval: 2000
  save_every_n_steps: 5000
  output_dir: "runs/large"

vocoder:
  type: "hifigan"
  checkpoint: null
